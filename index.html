<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Flashcard N5</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Flashcard Tiếng Nhật 🇯🇵</h1>

  <!-- MODE -->
  <p id="mode">Nhật → Việt</p>
  <button onclick="toggleMode()">🔄 Đổi hướng</button>

  <!-- CARD -->
  <div class="card-container" onclick="flipCard()">
    <div class="card" id="card">
      <div class="front" id="front"></div>
      <div class="back" id="back"></div>
    </div>
  </div>

  <!-- STATS -->
  <p id="progress"></p>
  <p id="wrongCount"></p>

  <!-- CONTROL -->
  <div>
    <button onclick="prevCard()">⬅️</button>
    <button onclick="nextCard()">➡️</button>
    <button onclick="randomCard()">🎲</button>
  </div>

  <div>
    <button onclick="markKnown()">✅ Biết</button>
    <button onclick="markWrong()">❌ Chưa biết</button>
  </div>

  <div>
    <button onclick="studyWrong()">📚 Học từ sai</button>
    <button onclick="backToAll()">🔙 Học tất cả</button>
    <button onclick="resetWrong()">🗑 Reset</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
