<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Flashcard N5</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📚 Flashcard N5</h1>

<!-- TAB -->
<div class="tabs">
  <button onclick="loadLesson('input.txt')">Buổi hiện tại</button>
  <button onclick="loadLesson('lesson1.txt')">Buổi 1</button>
  <button onclick="loadLesson('lesson2.txt')">Buổi 2</button>
</div>

<!-- MODE -->
<div class="top-bar">
  <span id="mode">Nhật → Việt</span>
  <button onclick="toggleMode()">🔄</button>
</div>

<!-- CARD -->
<div class="card-container" onclick="flipCard()">
  <div class="card" id="card">
    <div class="front" id="front"></div>
    <div class="back" id="back"></div>
  </div>
</div>

<!-- CONTROL -->
<div class="controls">
  <button onclick="prevCard()">⬅️</button>
  <button onclick="nextCard()">➡️</button>
  <button onclick="randomCard()">🎲</button>
  <button onclick="speak()">🔊</button>
</div>

<div class="controls">
  <button class="good" onclick="markKnown()">Biết</button>
  <button class="bad" onclick="markWrong()">Chưa biết</button>
</div>

<div class="controls">
  <button onclick="studyWrong()">📚 Sai</button>
  <button onclick="backToAll()">🔙 Tất cả</button>
</div>

<p id="progress"></p>
<p id="wrongCount"></p>

<script src="script.js"></script>
</body>
</html>
