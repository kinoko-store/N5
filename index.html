<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>N5 Learning App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📘 N5 Vocabulary</h1>

<!-- Tabs -->
<div id="tabs" class="tabs"></div>

<!-- Form -->
<div class="panel">
  <select id="lessonSelect"></select>

  <input id="jp" placeholder="Tiếng Nhật">
  <input id="vi" placeholder="Nghĩa">

  <button onclick="addWord()">➕ Thêm</button>

  <input type="file" id="fileInput" accept=".txt">
  <button onclick="importTxt()">📥 Import</button>

  <button onclick="startFlash()">🎴 Học</button>
</div>

<!-- List -->
<div id="list"></div>

<!-- Flashcard -->
<div id="flash" class="flash hidden">
  <div id="card"></div>
  <button onclick="flip()">Lật</button>
  <button onclick="next()">Tiếp</button>
  <button onclick="closeFlash()">Thoát</button>
</div>

<script src="script.js"></script>
</body>
</html>
