<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>N5 Pro App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📘 N5 Learning Pro</h1>

<!-- DASHBOARD -->
<div class="card" id="stats"></div>

<!-- TABS -->
<div id="tabs" class="tabs"></div>

<!-- QUẢN LÝ -->
<div class="card">
  <h3>➕ Thêm / Import</h3>

  <select id="lessonSelect"></select>
  <input id="jp" placeholder="Tiếng Nhật">
  <input id="vi" placeholder="Nghĩa">

  <button onclick="addWord()">Thêm</button>

  <input type="file" id="fileInput">
  <button onclick="importTxt()">Import</button>
</div>

<!-- HỌC -->
<div class="card">
  <h3>🎴 Học</h3>
  <button onclick="startFlash()">Học tất cả</button>
  <button onclick="startWrong()">Học từ sai</button>
</div>

<!-- LIST -->
<div id="list"></div>

<!-- FLASH -->
<div id="flash" class="flash hidden">
  <div id="card"></div>

  <button onclick="speak()">🔊</button>

  <div>
    <button onclick="flip()">Lật</button>
    <button onclick="markWrong()">❌ Sai</button>
    <button onclick="markRight()">✅ Đúng</button>
  </div>

  <button onclick="closeFlash()">Thoát</button>
</div>

<script src="script.js"></script>
</body>
</html>
