<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>N5 Offline App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📘 Học từ vựng N5 (Offline)</h1>

<!-- Tabs -->
<div id="tabs" class="tabs"></div>

<!-- Form -->
<div class="form">
  <h3>➕ Thêm từ</h3>

  <select id="lesson"></select>
  <input id="jp" placeholder="Tiếng Nhật">
  <input id="vi" placeholder="Nghĩa">

  <button onclick="addWord()">Thêm</button>

  <hr>

  <h3>📥 Import file TXT</h3>
  <input type="file" id="fileInput" accept=".txt">
  <button onclick="importFile()">Import TXT</button>
</div>

<!-- Hiển thị -->
<div id="app"></div>

<script src="script.js"></script>
</body>
</html>
